services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=foxscan
      - POSTGRES_USER=foxscan
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxscan"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
      - DATABASE_URL=postgresql://foxscan:${DB_PASSWORD}@db:5432/foxscan
      - ADMIN_SECRET=${ADMIN_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  ig-pipeline:
    build:
      context: ../ig
    restart: unless-stopped
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY}
      - DATABASE_URL=${IG_DATABASE_URL}
      - INSTAGRAM_USERNAME=${INSTAGRAM_USERNAME}
      - INSTAGRAM_PASSWORD=${INSTAGRAM_PASSWORD}
      - INSTAGRAM_ENABLED=${INSTAGRAM_ENABLED:-false}
      - IG_DATA_DIR=/app/ig_data
    volumes:
      - ig_data:/app/ig_data

volumes:
  postgres_data:
  ig_data:
